server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Cache de longo prazo para assets com hash (JS, CSS, imagens, fontes)
    location ~* \.(js|css|webp|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # robots.txt sem cache
    location = /robots.txt {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # HTML e SPA: cache curto (melhora TTFB sem perder atualizacao rapida)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=60, stale-while-revalidate=300";
    }

    # Gzip melhorado
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        image/svg+xml
        font/woff2;

    # Brotli (habilitar apenas se o modulo estiver disponivel no Nginx)
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css text/javascript application/javascript application/json image/svg+xml font/woff2;
}

